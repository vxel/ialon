# Ialon block catalog - the single source of truth for every block, loaded at startup by
# IalonBlockCatalog. This file plus the Blocks/Textures/ folder form a self-contained THEME:
# editing it (and swapping textures) is how you re-skin or extend the game, no recompile needed.
#
# ── Top-level keys ───────────────────────────────────────────────────────────────────────────
#   shapeSets:  named, reusable lists of shape ids (see below), referenced by a block's `shapeSet`.
#   blocks:     the block catalog - one entry per block "family".
#
# ── A block entry ────────────────────────────────────────────────────────────────────────────
# Identity & appearance:
#   type          (required) material/identity id, e.g. "grass". Also the texture-array key and the
#                 string the engine dispatches on. Used to build block names (see "Names" below).
#   texture       diffuse image path, relative to this file's folder (e.g. Textures/grass.png).
#                 A 64×64 png = one tile; a 64×192 png = stacked top/side/bottom (use multitexture:true).
#                 The type is packed into the block texture array -- exactly one of texture/material.
#   material      a .j3m path (e.g. Textures/fire.j3m) rendered directly - procedural fire/lava. It
#                 carries no diffuse tile, so the type stays OUT of the texture array.
#
# Boolean flags (all optional; defaults shown):
#   solid:        true    participates in the collision mesh.
#   transparent:  false   adjacent transparent faces are culled (glass, leaves, water).
#   multitexture: false   texture is a stacked top/side/bottom image (see `texture`).
#   torchlight:   false   emits light (lamps, fire, lava).
#   terrain:      false   natural ground: its CUBE form shapes the far-terrain heightmap
#                         (grass, grass_snow, snow, dirt, rock, sand). Only the cube form counts.
#
# Shapes - a block is one of two kinds:
#   • catalog block:  shapeSet: <name>   and/or   shapes: [id, id, ...]   (concatenated if both).
#                     Fans out into one registered block per shape; every non-cube shape also fans
#                     out over the 8 liquid levels 0..7. Shape ids are the ShapeIds string values
#                     (cube_up, slab_up, stairs_north, door_east, cross_plane, billboard, ...).
#   • liquid family:  variants: [ {name, shape, level[, palette]}, ... ]   (water, lava). Each variant
#                     is ONE explicitly-named block at a single shape and liquid level (0..7).
#
# Placeability (optional):
#   palette: { order: <int>, shape: <shapeId> }   makes the block selectable in the build slider.
#            `order` sets its position (ascending; gaps of 10 leave room to insert). `shape` is the
#            form previewed/placed. On a variant, palette takes only { order } (its name is explicit).
#
# ── Names (block ids) ────────────────────────────────────────────────────────────────────────
#   cube form → "<type>"
#   other shapes → "<type>-<shape>-<level>"   (see BlockIds.getName).
#   Liquid variants use their explicit `name` (e.g. water_source, water-liquid_1).

