# Catalogue des blocs Ialon - source de vérité unique.
# Généré depuis IalonBlock ; désormais édité à la main.
# shapeSets : jeux de formes réutilisables. blocks : blocs-catalogue (shapeSet/shapes)
# ou familles de liquide (variants). Défauts : solid=true, transparent=false,
# multitexture=false, torchlight=false, terrain=false, render=atlas.

shapeSets:
  standard:
    - cube_up
    - pyramid_up
    - pole_up
    - fence_up
    - slab_up
    - double_slab_up
    - plate_up
    - wedge_north
    - wedge_east
    - wedge_south
    - wedge_west
