    - stairs_inverted_outer_corner_north
    - stairs_inverted_outer_corner_east
    - stairs_inverted_outer_corner_south
    - stairs_inverted_outer_corner_west
  standardNoStairs:
    - cube_up
    - pyramid_up
    - pole_up
    - fence_up
    - slab_up
    - double_slab_up
    - plate_up
    - wedge_north
    - wedge_east
    - wedge_south
    - wedge_west
    - wedge_inverted_north
    - wedge_inverted_east
    - wedge_inverted_south
    - wedge_inverted_west

